<svg xmlns="http://www.w3.org/2000/svg" width="1280" height="430" viewBox="0 0 1280 430">
  <defs>
    <style>
      .bg { fill: #f7f4ee; }
      .panel { fill: #ffffff; stroke: #23343d; stroke-width: 2.2; rx: 18; ry: 18; }
      .bad { fill: #fbe7e5; stroke: #c05d56; stroke-width: 1.8; rx: 14; ry: 14; }
      .good { fill: #e8f4ea; stroke: #4f8d61; stroke-width: 1.8; rx: 14; ry: 14; }
      .soft { fill: #f9faf8; stroke: #b8c1c7; stroke-width: 1.2; rx: 12; ry: 12; }
      .title { font: 700 26px Georgia, 'Times New Roman', serif; fill: #14232d; }
      .subtitle { font: 700 20px Georgia, 'Times New Roman', serif; fill: #14232d; }
      .label { font: 700 13px Arial, Helvetica, sans-serif; fill: #ffffff; }
      .chip { fill: #23343d; rx: 9; ry: 9; }
      .body { font: 16px Arial, Helvetica, sans-serif; fill: #1d2b33; }
      .small { font: 13px Arial, Helvetica, sans-serif; fill: #59686f; }
      .tiny { font: 12px Arial, Helvetica, sans-serif; fill: #59686f; }
    </style>
    <marker id="arrow" markerWidth="12" markerHeight="12" refX="10" refY="6" orient="auto">
      <path d="M0,0 L12,6 L0,12 z" fill="#425863"/>
    </marker>
  </defs>

  <rect class="bg" x="0" y="0" width="1280" height="430"/>

  <text x="34" y="38" class="title">Mismatch between answer formulation and temporal grounding</text>

  <rect class="panel" x="30" y="58" width="560" height="336"/>
  <rect class="panel" x="690" y="58" width="560" height="336"/>

  <text x="52" y="92" class="subtitle">Without refinement</text>
  <text x="712" y="92" class="subtitle">With query refinement</text>

  <rect class="soft" x="52" y="108" width="516" height="66"/>
  <text x="68" y="132" class="small">Question</text>
  <text x="68" y="157" class="body">Why does the woman run back to the kitchen table?</text>

  <rect class="soft" x="712" y="108" width="516" height="66"/>
  <text x="728" y="132" class="small">Question</text>
  <text x="728" y="157" class="body">Why does the woman run back to the kitchen table?</text>

  <rect class="bad" x="52" y="194" width="516" height="92"/>
  <rect class="chip" x="70" y="208" width="132" height="22"/>
  <text x="87" y="223" class="label">Raw answer option</text>
  <text x="70" y="252" class="body">"She hears the kettle boiling."</text>
  <text x="70" y="274" class="tiny">Short answer text is useful for discrimination, but it does not clearly describe the</text>
  <text x="70" y="290" class="tiny">observable event to retrieve.</text>

  <rect class="good" x="712" y="194" width="516" height="110"/>
  <rect class="chip" x="730" y="208" width="118" height="22"/>
  <text x="750" y="223" class="label">Refined query</text>
  <text x="730" y="252" class="body">"the kettle starts boiling on the stove, and the woman immediately</text>
  <text x="730" y="274" class="body">turns and runs back to the kitchen table after hearing it"</text>
  <text x="730" y="296" class="tiny">The refined query makes the visual trigger and temporal cue explicit.</text>

  <line x1="590" y1="240" x2="690" y2="240" stroke="#425863" stroke-width="3.2" marker-end="url(#arrow)"/>
  <text x="620" y="223" class="small">Refiner</text>

  <text x="52" y="324" class="small">Temporal retrieval</text>
  <text x="712" y="324" class="small">Temporal retrieval</text>

  <rect class="soft" x="52" y="338" width="516" height="34"/>
  <rect class="soft" x="712" y="338" width="516" height="34"/>

  <line x1="92" y1="355" x2="528" y2="355" stroke="#6c7c84" stroke-width="3.2"/>
  <line x1="752" y1="355" x2="1188" y2="355" stroke="#6c7c84" stroke-width="3.2"/>

  <rect x="360" y="347" width="110" height="16" fill="none" stroke="#23343d" stroke-width="1.4" stroke-dasharray="5,4"/>
  <rect x="928" y="347" width="110" height="16" fill="none" stroke="#23343d" stroke-width="1.4" stroke-dasharray="5,4"/>

  <rect x="442" y="343" width="118" height="24" fill="#d96e67" rx="10" ry="10"/>
  <rect x="936" y="343" width="118" height="24" fill="#57a86f" rx="10" ry="10"/>

  <text x="122" y="384" class="tiny">ground-truth evidence</text>
  <line x1="96" y1="379" x2="116" y2="379" stroke="#23343d" stroke-width="1.4" stroke-dasharray="5,4"/>
  <text x="292" y="384" class="tiny">retrieved span</text>
  <rect x="248" y="372" width="34" height="12" fill="#d96e67" rx="6" ry="6"/>

  <text x="782" y="384" class="tiny">ground-truth evidence</text>
  <line x1="756" y1="379" x2="776" y2="379" stroke="#23343d" stroke-width="1.4" stroke-dasharray="5,4"/>
  <text x="952" y="384" class="tiny">retrieved span</text>
  <rect x="908" y="372" width="34" height="12" fill="#57a86f" rx="6" ry="6"/>

  <text x="52" y="410" class="body">Poor grounding: retrieval shifts to a semantically weak, late segment.</text>
  <text x="712" y="410" class="body">Better grounding: retrieval aligns with the answer-supporting evidence.</text>
</svg>
