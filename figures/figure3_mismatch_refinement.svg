<svg xmlns="http://www.w3.org/2000/svg" width="1500" height="860" viewBox="0 0 1500 860">
  <defs>
    <style>
      .bg { fill: #f6f2ea; }
      .panel { fill: #ffffff; stroke: #21333f; stroke-width: 2.5; rx: 22; ry: 22; }
      .soft { fill: #fbfaf7; stroke: #b8c1c7; stroke-width: 1.5; rx: 15; ry: 15; }
      .bad { fill: #fbe8e7; stroke: #b85c55; stroke-width: 2; rx: 18; ry: 18; }
      .good { fill: #e8f5ea; stroke: #4f8d5c; stroke-width: 2; rx: 18; ry: 18; }
      .neutral { fill: #ecf3f8; stroke: #6289a6; stroke-width: 2; rx: 18; ry: 18; }
      .title { font: 700 30px Georgia, 'Times New Roman', serif; fill: #14232d; }
      .subtitle { font: 700 21px Georgia, 'Times New Roman', serif; fill: #14232d; }
      .body { font: 16px Arial, Helvetica, sans-serif; fill: #1d2b33; }
      .small { font: 14px Arial, Helvetica, sans-serif; fill: #516169; }
      .tiny { font: 13px Arial, Helvetica, sans-serif; fill: #516169; }
      .chip { font: 700 13px Arial, Helvetica, sans-serif; fill: #ffffff; }
      .chipbox { fill: #21333f; rx: 10; ry: 10; }
      .scorebad { fill: #b4433c; }
      .scoregood { fill: #1d6a37; }
    </style>
    <marker id="arrow" markerWidth="12" markerHeight="12" refX="10" refY="6" orient="auto">
      <path d="M0,0 L12,6 L0,12 z" fill="#425863"/>
    </marker>
  </defs>

  <rect class="bg" x="0" y="0" width="1500" height="860"/>

  <text x="52" y="58" class="title">Mismatch between answer formulation and temporal grounding</text>
  <text x="52" y="90" class="body">Raw answer candidates are often too abstract for retrieval. Query refinement exposes visually localizable evidence and improves temporal retrieval.</text>

  <rect class="panel" x="48" y="132" width="660" height="676"/>
  <rect class="panel" x="792" y="132" width="660" height="676"/>

  <text x="74" y="176" class="subtitle">Without refinement</text>
  <text x="818" y="176" class="subtitle">With query refinement</text>

  <rect class="soft" x="74" y="198" width="608" height="92"/>
  <text x="96" y="226" class="small">Question</text>
  <text x="96" y="254" class="body">Why does the woman run back to the kitchen table?</text>
  <text x="96" y="277" class="tiny">The model must identify the evidence moment that explains the action.</text>

  <rect class="soft" x="818" y="198" width="608" height="92"/>
  <text x="840" y="226" class="small">Question</text>
  <text x="840" y="254" class="body">Why does the woman run back to the kitchen table?</text>
  <text x="840" y="277" class="tiny">The same question, but answer options are converted into evidence-oriented queries.</text>

  <rect class="bad" x="74" y="320" width="608" height="138"/>
  <rect class="chipbox" x="96" y="340" width="138" height="24"/>
  <text x="114" y="357" class="chip">Raw answer option</text>
  <text x="96" y="396" class="body">"She hears the kettle boiling."</text>
  <text x="96" y="426" class="tiny">The option is short, abstract, and written for answer discrimination.</text>
  <text x="96" y="449" class="tiny">It does not explicitly describe the visible event to retrieve.</text>

  <rect class="good" x="818" y="320" width="608" height="164"/>
  <rect class="chipbox" x="840" y="340" width="124" height="24"/>
  <text x="862" y="357" class="chip">Refined query</text>
  <text x="840" y="396" class="body">"the kettle on the stove starts boiling, and the woman immediately</text>
  <text x="840" y="422" class="body">runs back to the kitchen table after hearing it"</text>
  <text x="840" y="452" class="tiny">The refined query makes the visual cue and temporal trigger explicit.</text>
  <text x="840" y="475" class="tiny">This gives the retriever a much more localizable description.</text>

  <text x="74" y="510" class="small">Retrieved evidence on timeline</text>
  <text x="818" y="510" class="small">Retrieved evidence on timeline</text>

  <rect class="soft" x="74" y="528" width="608" height="188"/>
  <rect class="soft" x="818" y="528" width="608" height="188"/>

  <line x1="130" y1="605" x2="620" y2="605" stroke="#6c7c84" stroke-width="4"/>
  <line x1="874" y1="605" x2="1364" y2="605" stroke="#6c7c84" stroke-width="4"/>

  <line x1="130" y1="593" x2="130" y2="617" stroke="#6c7c84" stroke-width="2"/>
  <line x1="228" y1="593" x2="228" y2="617" stroke="#6c7c84" stroke-width="2"/>
  <line x1="326" y1="593" x2="326" y2="617" stroke="#6c7c84" stroke-width="2"/>
  <line x1="424" y1="593" x2="424" y2="617" stroke="#6c7c84" stroke-width="2"/>
  <line x1="522" y1="593" x2="522" y2="617" stroke="#6c7c84" stroke-width="2"/>
  <line x1="620" y1="593" x2="620" y2="617" stroke="#6c7c84" stroke-width="2"/>

  <line x1="874" y1="593" x2="874" y2="617" stroke="#6c7c84" stroke-width="2"/>
  <line x1="972" y1="593" x2="972" y2="617" stroke="#6c7c84" stroke-width="2"/>
  <line x1="1070" y1="593" x2="1070" y2="617" stroke="#6c7c84" stroke-width="2"/>
  <line x1="1168" y1="593" x2="1168" y2="617" stroke="#6c7c84" stroke-width="2"/>
  <line x1="1266" y1="593" x2="1266" y2="617" stroke="#6c7c84" stroke-width="2"/>
  <line x1="1364" y1="593" x2="1364" y2="617" stroke="#6c7c84" stroke-width="2"/>

  <text x="118" y="640" class="tiny">0s</text>
  <text x="214" y="640" class="tiny">6s</text>
  <text x="309" y="640" class="tiny">12s</text>
  <text x="405" y="640" class="tiny">18s</text>
  <text x="503" y="640" class="tiny">24s</text>
  <text x="596" y="640" class="tiny">30s</text>

  <text x="862" y="640" class="tiny">0s</text>
  <text x="958" y="640" class="tiny">6s</text>
  <text x="1053" y="640" class="tiny">12s</text>
  <text x="1149" y="640" class="tiny">18s</text>
  <text x="1247" y="640" class="tiny">24s</text>
  <text x="1340" y="640" class="tiny">30s</text>

  <rect x="432" y="590" width="102" height="30" fill="#d96e67" rx="11" ry="11"/>
  <text x="447" y="610" class="chip">retrieved span</text>
  <rect x="1084" y="590" width="102" height="30" fill="#56a56c" rx="11" ry="11"/>
  <text x="1099" y="610" class="chip">retrieved span</text>

  <rect x="333" y="666" width="114" height="14" fill="none" stroke="#1d2b33" stroke-width="1.5" stroke-dasharray="5,5"/>
  <text x="454" y="678" class="tiny">ground-truth evidence</text>

  <rect x="1072" y="666" width="114" height="14" fill="none" stroke="#1d2b33" stroke-width="1.5" stroke-dasharray="5,5"/>
  <text x="1194" y="678" class="tiny">ground-truth evidence</text>

  <text x="96" y="705" class="body">Low overlap with the true evidence</text>
  <text x="840" y="705" class="body">High overlap with the true evidence</text>

  <rect class="bad" x="74" y="738" width="608" height="48"/>
  <text x="96" y="768" class="body">Incorrect localization: retrieval is pulled toward a semantically weak or late distractor.</text>

  <rect class="good" x="818" y="738" width="608" height="48"/>
  <text x="840" y="768" class="body">Better localization: retrieval aligns with the visible, answer-supporting temporal moment.</text>

  <line x1="708" y1="470" x2="790" y2="470" stroke="#425863" stroke-width="4" marker-end="url(#arrow)"/>
  <text x="725" y="446" class="small">Refiner</text>
</svg>
