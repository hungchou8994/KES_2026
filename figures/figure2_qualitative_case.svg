<svg xmlns="http://www.w3.org/2000/svg" width="1400" height="920" viewBox="0 0 1400 920">
  <defs>
    <style>
      .bg { fill: #f7f4ee; }
      .panel { fill: #ffffff; stroke: #243746; stroke-width: 2; rx: 20; ry: 20; }
      .soft { fill: #fbfaf7; stroke: #b7c2c8; stroke-width: 1.5; rx: 14; ry: 14; }
      .title { font: 700 28px Georgia, 'Times New Roman', serif; fill: #15232d; }
      .subtitle { font: 700 18px Georgia, 'Times New Roman', serif; fill: #15232d; }
      .body { font: 16px Arial, Helvetica, sans-serif; fill: #1c2b33; }
      .small { font: 14px Arial, Helvetica, sans-serif; fill: #42535c; }
      .tiny { font: 13px Arial, Helvetica, sans-serif; fill: #42535c; }
      .optA { fill: #e7f3ff; stroke: #5b8db8; stroke-width: 1.5; rx: 12; ry: 12; }
      .optB { fill: #e9f7ea; stroke: #4c8d58; stroke-width: 2; rx: 12; ry: 12; }
      .optC { fill: #fff1dc; stroke: #c79238; stroke-width: 1.5; rx: 12; ry: 12; }
      .optD { fill: #f7e6ef; stroke: #a75c83; stroke-width: 1.5; rx: 12; ry: 12; }
      .good { fill: #1f6d38; font: 700 14px Arial, Helvetica, sans-serif; }
      .muted { fill: #5b6970; }
      .score { font: 700 14px Arial, Helvetica, sans-serif; fill: #ffffff; }
      .node { fill: #edf2f4; stroke: #85939b; stroke-width: 1.5; rx: 16; ry: 16; }
      .answer { fill: #133b29; }
    </style>
    <marker id="arrow" markerWidth="12" markerHeight="12" refX="10" refY="6" orient="auto">
      <path d="M0,0 L12,6 L0,12 z" fill="#405560"/>
    </marker>
  </defs>

  <rect class="bg" x="0" y="0" width="1400" height="920"/>

  <text x="56" y="58" class="title">Qualitative Example: Refinement improves temporal evidence retrieval</text>
  <text x="56" y="88" class="body">A concrete multiple-choice grounded VideoQA case showing why raw options are weak retrieval queries and how the selected evidence supports the final answer.</text>

  <rect class="panel" x="48" y="120" width="380" height="735"/>
  <text x="74" y="160" class="subtitle">1. Input question and answer options</text>

  <rect class="soft" x="72" y="184" width="332" height="86"/>
  <text x="90" y="213" class="small">Question</text>
  <text x="90" y="240" class="body">Why does the woman run back to the kitchen table?</text>
  <text x="90" y="262" class="tiny">The answer requires finding the event that explains her sudden return.</text>

  <rect class="optA" x="72" y="300" width="332" height="92"/>
  <text x="90" y="330" class="subtitle">A</text>
  <text x="120" y="330" class="body">She forgot her phone.</text>
  <text x="120" y="356" class="tiny">Short and discriminative, but still vague as a visual grounding query.</text>

  <rect class="optB" x="72" y="408" width="332" height="108"/>
  <text x="90" y="438" class="subtitle">B</text>
  <text x="120" y="438" class="body">She hears the kettle boiling.</text>
  <text x="120" y="464" class="tiny">Correct answer, but the raw option does not explicitly describe the</text>
  <text x="120" y="485" class="tiny">visible evidence span that should be retrieved.</text>
  <text x="90" y="503" class="good">Correct option</text>

  <rect class="optC" x="72" y="534" width="332" height="92"/>
  <text x="90" y="564" class="subtitle">C</text>
  <text x="120" y="564" class="body">She wants to close the window.</text>
  <text x="120" y="590" class="tiny">Semantically plausible, yet not tightly tied to the target moment.</text>

  <rect class="optD" x="72" y="642" width="332" height="92"/>
  <text x="90" y="672" class="subtitle">D</text>
  <text x="120" y="672" class="body">She is calling a friend.</text>
  <text x="120" y="698" class="tiny">Language prior can make this look reasonable without visual support.</text>

  <rect class="soft" x="72" y="758" width="332" height="74"/>
  <text x="90" y="787" class="small">Key issue</text>
  <text x="90" y="814" class="body">Raw answers are written for choice discrimination, not for localizing</text>
  <text x="90" y="835" class="body">the evidence clip that justifies the answer.</text>

  <rect class="panel" x="458" y="120" width="894" height="250"/>
  <text x="484" y="160" class="subtitle">2. Refiner rewrites each option into evidence-oriented retrieval text</text>

  <rect class="optA" x="484" y="186" width="840" height="34"/>
  <text x="500" y="208" class="body">A  "the woman notices her phone left on the table and turns back to pick it up"</text>

  <rect class="optB" x="484" y="232" width="840" height="58"/>
  <text x="500" y="255" class="body">B  "the kettle on the stove begins to boil, and the woman immediately runs back</text>
  <text x="500" y="278" class="body">to the kitchen table after hearing it"</text>

  <rect class="optC" x="484" y="302" width="840" height="34"/>
  <text x="500" y="324" class="body">C  "the woman returns because she wants to shut the open window nearby"</text>

  <text x="484" y="355" class="small">The refined query for option B exposes a visible, temporally localizable event instead of a short answer phrase.</text>

  <rect class="panel" x="458" y="398" width="894" height="286"/>
  <text x="484" y="438" class="subtitle">3. Retriever proposes top-K candidate moments on the full video timeline</text>

  <text x="492" y="485" class="small">Video timeline</text>
  <line x1="560" y1="480" x2="1274" y2="480" stroke="#68777f" stroke-width="4"/>
  <line x1="560" y1="470" x2="560" y2="490" stroke="#68777f" stroke-width="2"/>
  <line x1="703" y1="470" x2="703" y2="490" stroke="#68777f" stroke-width="2"/>
  <line x1="846" y1="470" x2="846" y2="490" stroke="#68777f" stroke-width="2"/>
  <line x1="989" y1="470" x2="989" y2="490" stroke="#68777f" stroke-width="2"/>
  <line x1="1132" y1="470" x2="1132" y2="490" stroke="#68777f" stroke-width="2"/>
  <line x1="1274" y1="470" x2="1274" y2="490" stroke="#68777f" stroke-width="2"/>
  <text x="548" y="512" class="tiny">0s</text>
  <text x="690" y="512" class="tiny">6s</text>
  <text x="834" y="512" class="tiny">12s</text>
  <text x="976" y="512" class="tiny">18s</text>
  <text x="1118" y="512" class="tiny">24s</text>
  <text x="1262" y="512" class="tiny">30s</text>

  <text x="494" y="552" class="small">A</text>
  <rect class="optA" x="705" y="532" width="118" height="28"/>
  <text x="840" y="551" class="tiny">top-1 candidate</text>

  <text x="494" y="596" class="small">B</text>
  <rect class="optB" x="868" y="576" width="118" height="28"/>
  <rect class="optB" x="1004" y="576" width="82" height="28"/>
  <text x="1100" y="595" class="tiny">two retrieved candidates</text>

  <text x="494" y="640" class="small">C</text>
  <rect class="optC" x="1088" y="620" width="96" height="28"/>
  <text x="1198" y="639" class="tiny">late distractor</text>

  <text x="494" y="676" class="small">GT</text>
  <rect x="887" y="660" width="96" height="16" fill="#1c2b33" opacity="0.12"/>
  <rect x="887" y="660" width="96" height="16" fill="none" stroke="#1c2b33" stroke-width="1.5" stroke-dasharray="5,5"/>
  <text x="996" y="673" class="tiny">ground-truth evidence</text>

  <rect class="soft" x="484" y="702" width="840" height="62"/>
  <text x="500" y="730" class="body">After refinement, the correct option retrieves a tight span around the boiling event, while distractors remain weak or temporally off-target.</text>

  <rect class="panel" x="458" y="710" width="540" height="145"/>
  <text x="484" y="750" class="subtitle">4. Selector verifies candidate evidence</text>
  <rect class="node" x="486" y="772" width="116" height="44"/>
  <rect class="node" x="622" y="772" width="116" height="44"/>
  <rect class="node" x="758" y="772" width="116" height="44"/>
  <text x="515" y="799" class="body">A: 0.21</text>
  <text x="651" y="799" class="body">B1: 0.93</text>
  <text x="787" y="799" class="body">B2: 0.62</text>
  <text x="486" y="839" class="small">The selector favors the candidate most faithful to the question, not merely the one that is temporally close.</text>

  <rect class="panel" x="1022" y="710" width="330" height="145"/>
  <text x="1048" y="750" class="subtitle">5. Generator answers from the selected clip</text>
  <rect x="1048" y="770" width="278" height="34" fill="#eff7f0" stroke="#4c8d58" stroke-width="2" rx="12" ry="12"/>
  <text x="1062" y="792" class="body">Selected evidence: 13s to 17s</text>
  <rect x="1048" y="812" width="278" height="26" fill="#133b29" rx="12" ry="12"/>
  <text x="1062" y="830" class="score">Final answer: B  She hears the kettle boiling.</text>

  <line x1="428" y1="490" x2="456" y2="490" stroke="#405560" stroke-width="3" marker-end="url(#arrow)"/>
  <line x1="905" y1="370" x2="905" y2="396" stroke="#405560" stroke-width="3" marker-end="url(#arrow)"/>
  <line x1="999" y1="782" x2="1020" y2="782" stroke="#405560" stroke-width="3" marker-end="url(#arrow)"/>
</svg>
